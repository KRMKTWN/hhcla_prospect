<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>HHCLA Prospect — HUB Textile</title>
<style>
:root{--orange:#f47a20;--black:#000;--white:#fff;--gray:#b8b8b8}
*{box-sizing:border-box}html{background:#000;color:#fff;font-family:Inter,Arial,sans-serif}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 15%,#1b1b1b 0,#080808 38%,#000 72%)}
main{width:min(100%,720px);min-height:100vh;padding:56px 28px 42px;display:flex;flex-direction:column;justify-content:space-between}
.brand{display:flex;justify-content:space-between;align-items:flex-start;gap:24px}.hhcla{font-weight:900;font-size:clamp(42px,13vw,86px);line-height:.82;letter-spacing:.02em}.org{max-width:190px;text-align:right;text-transform:uppercase;font-size:12px;line-height:1.35;letter-spacing:.16em;color:#ddd}.line{height:4px;width:96px;background:var(--orange);margin-top:22px}
.hero{padding:12vh 0 8vh}.eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);margin-bottom:20px}.mark{font-size:clamp(46px,13vw,92px);font-weight:750;line-height:.9;letter-spacing:-.04em;white-space:nowrap}.mark b{color:var(--orange)}h1{font-size:clamp(30px,8vw,54px);line-height:1.02;margin:28px 0 18px;max-width:620px}.lead{font-size:clamp(17px,4.5vw,24px);line-height:1.45;color:#d2d2d2;max-width:620px}
.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:36px 0}.flow span{border-top:1px solid #444;padding-top:12px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#bbb}.flow span:last-child{border-color:var(--orange);color:#fff}
footer{display:flex;justify-content:space-between;gap:20px;align-items:end;border-top:1px solid #222;padding-top:20px;color:#999;font-size:12px;line-height:1.4}.status{color:#fff}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:8px}
@media(max-width:520px){main{padding-top:34px}.org{font-size:9px;max-width:135px}.flow{grid-template-columns:1fr 1fr}.hero{padding-top:10vh}}
</style>
</head>
<body>
<main>
<header>
<div class="brand">
<div><div class="hhcla">HHCLA</div><div class="line"></div></div>
<div class="org">Homeless<br>Health Care<br>Los Angeles</div>
</div>
</header>
<section class="hero">
<div class="eyebrow">Prospect Presentation</div>
<div class="mark"><b>&gt;</b>[ HUB ]<b>&gt;</b></div>
<h1>TEXTILE</h1>
<p class="lead">A local system that connects useful resources, paid participation, practical learning, repair, and dignified distribution.</p>
<div class="flow"><span>Campus</span><span>Workshops</span><span>Work Program</span><span>HUB</span></div>
</section>
<footer>
<div><span class="dot"></span><span class="status">Presentation in development</span></div>
<div>English · Portrait · Mobile-first</div>
</footer>
</main>
</body>
</html>
